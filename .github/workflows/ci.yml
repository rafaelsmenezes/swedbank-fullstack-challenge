name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run backend tests
        run: |
          cd bank-api
          ./gradlew test --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: bank-api/build/test-results/test/*.xml
        if: always()

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd bank-frontend
          npm ci

      - name: Build frontend
        run: |
          cd bank-frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: bank-frontend/dist/

  docker-build:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start containers and healthcheck
        run: |
          docker compose up -d
          sleep 30
          docker compose ps
          curl -f http://localhost:8080/api/v1/accounts?userId=1 || exit 1

      - name: Stop containers
        if: always()
        run: docker compose down
