version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bankdb
      POSTGRES_USER: swedbank
      POSTGRES_PASSWORD: swedbank123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swedbank -d bankdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - swedenbank-net

  bank-api:
    build:
      context: ./bank-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/accounts?userId=1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swedenbank-net

  bank-frontend:
    build:
      context: ./bank-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      bank-api:
        condition: service_healthy
    networks:
      - swedenbank-net

volumes:
  postgres_data:

networks:
  swedenbank-net:
    driver: bridge
